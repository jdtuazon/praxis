name: Deploy backend (Render)

# This sandbox can't reach Render directly, so the deploy runs from a GitHub
# runner. Add a repo secret RENDER_API_KEY (and optionally RENDER_SERVICE_ID),
# or a single RENDER_DEPLOY_HOOK secret. Then deploys fire automatically on push
# to main, or on demand via the "Run workflow" button.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "praxis/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          SERVICE_NAME="${RENDER_SERVICE_NAME:-praxis-api}"

          if [ -n "${RENDER_DEPLOY_HOOK:-}" ]; then
            echo "Triggering deploy via deploy hook..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK" && echo "deploy hook accepted"
            exit 0
          fi

          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::warning::No RENDER_DEPLOY_HOOK or RENDER_API_KEY secret set - nothing to deploy."
            echo "Add one in Settings > Secrets and variables > Actions, then re-run."
            exit 0
          fi

          AUTH="Authorization: Bearer $RENDER_API_KEY"
          SID="${RENDER_SERVICE_ID:-}"
          if [ -z "$SID" ]; then
            echo "Looking up service '$SERVICE_NAME'..."
            SID=$(curl -fsS -H "$AUTH" "https://api.render.com/v1/services?limit=100" \
              | SERVICE_NAME="$SERVICE_NAME" python3 -c 'import sys,json,os
name=os.environ["SERVICE_NAME"]
items=json.load(sys.stdin)
def svc(i): return i.get("service", i)
sid=""
for i in items:
    if svc(i).get("name")==name: sid=svc(i)["id"]; break
if not sid:
    for i in items:
        d=svc(i).get("serviceDetails",{}) or {}
        if name in (d.get("url") or ""): sid=svc(i)["id"]; break
print(sid)')
          fi

          if [ -z "$SID" ]; then
            echo "::error::Could not resolve a Render service id. Set the RENDER_SERVICE_ID secret."
            exit 1
          fi

          echo "Deploying service $SID..."
          RESP=$(curl -fsS -X POST -H "$AUTH" -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$SID/deploys" -d '{"clearCache":"do_not_clear"}')
          echo "$RESP" | python3 -c 'import sys,json;print("deploy queued:", json.load(sys.stdin).get("id","?"))'
