name: Deploy backend (Render)

# This sandbox can't reach Render directly, so the deploy runs from a GitHub
# runner. Add a repo secret RENDER_API_KEY (and optionally RENDER_SERVICE_ID),
# or a single RENDER_DEPLOY_HOOK secret. Then deploys fire automatically on push
# to main, or on demand via the "Run workflow" button.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "praxis/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      RENDER_SERVICE_NAME: praxis-api
    steps:
      - name: Deploy
        run: |
          set -euo pipefail
          if [ -n "${RENDER_DEPLOY_HOOK:-}" ]; then
            echo "Triggering deploy via deploy hook..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK" && echo "deploy hook accepted"
            exit 0
          fi
          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::warning::No RENDER_API_KEY or RENDER_DEPLOY_HOOK secret set - nothing to deploy. Add one in Settings > Secrets and variables > Actions, then re-run."
            exit 0
          fi
          AUTH="Authorization: Bearer $RENDER_API_KEY"
          SID="${RENDER_SERVICE_ID:-}"
          if [ -z "$SID" ]; then
            echo "Resolving service '$RENDER_SERVICE_NAME'..."
            SID=$(curl -fsS -H "$AUTH" "https://api.render.com/v1/services?limit=100" | jq -r --arg n "$RENDER_SERVICE_NAME" 'map(.service // .) | (map(select(.name==$n)) + map(select((.serviceDetails.url // "") | contains($n)))) | (.[0].id // "")')
          fi
          if [ -z "$SID" ] || [ "$SID" = "null" ]; then
            echo "::error::Could not resolve a Render service id. Set the RENDER_SERVICE_ID secret."
            exit 1
          fi
          echo "Deploying service $SID..."
          curl -fsS -X POST -H "$AUTH" -H "Content-Type: application/json" "https://api.render.com/v1/services/$SID/deploys" -d '{"clearCache":"do_not_clear"}' | jq -r '"deploy queued: " + (.id // "?")'
