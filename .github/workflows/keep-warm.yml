name: keep-warm

# Pings the Render backend so the free tier never hits its ~15-min idle
# spin-down. Runs every 10 minutes (GitHub's scheduler can drift a few
# minutes under load, so 10 leaves a safe buffer under the 15-min cutoff).
# Manual runs allowed via the "Run workflow" button.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          URL="https://praxis-api-z1nn.onrender.com/api/health"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL") || code="000"
            if [ "$code" = "200" ]; then
              echo "healthy ($code) on attempt $i"
              exit 0
            fi
            echo "attempt $i got HTTP $code; retrying in 15s (cold start can take ~30-60s)"
            sleep 15
          done
          echo "health check failed after 3 attempts"
          exit 1
